<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>2048</title>
<style>
.dpad { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 16px; }
.dpad-row { display: flex; gap: 4px; }
.dpad-btn { width: 64px; height: 64px; border: none; border-radius: 8px; background: #bbada0; color: #fff; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-tap-highlight-color: transparent; }
.dpad-btn:active { background: #9f8b76; }
.dpad-btn.empty { background: transparent; pointer-events: none; }
@media (min-width: 520px) { .dpad { display: none; } }
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
body { background: #faf8ef; font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 40px; }
.container { width: 500px; max-width: 94vw; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
h1 { font-size: 64px; font-weight: bold; color: #776e65; }
.score-box { background: #bbada0; color: #fff; padding: 8px 20px; border-radius: 6px; text-align: center; }
.score-box .label { font-size: 12px; text-transform: uppercase; }
.score-box .value { font-size: 22px; font-weight: bold; }
.btn { background: #8f7a66; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-size: 16px; cursor: pointer; }
.btn:active { background: #9f8b76; }
.grid-bg { background: #bbada0; border-radius: 8px; padding: 8px; display: grid; gap: 8px; grid-template-columns: repeat(4, 1fr); aspect-ratio: 1; }
.tile { background: #cdc1b4; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; color: #776e65; transition: .1s; aspect-ratio: 1; }
.tile[data-v="2"]    { background: #eee4da; }
.tile[data-v="4"]    { background: #ede0c8; }
.tile[data-v="8"]    { background: #f2b179; color: #f9f6f2; }
.tile[data-v="16"]   { background: #f59563; color: #f9f6f2; }
.tile[data-v="32"]   { background: #f67c5f; color: #f9f6f2; }
.tile[data-v="64"]   { background: #f65e3b; color: #f9f6f2; }
.tile[data-v="128"]  { background: #edcf72; color: #f9f6f2; font-size: 34px; }
.tile[data-v="256"]  { background: #edcc61; color: #f9f6f2; font-size: 34px; }
.tile[data-v="512"]  { background: #edc850; color: #f9f6f2; font-size: 34px; }
.tile[data-v="1024"] { background: #edc53f; color: #f9f6f2; font-size: 28px; }
.tile[data-v="2048"] { background: #edc22e; color: #f9f6f2; font-size: 28px; }
.msg { text-align: center; margin-top: 16px; font-size: 18px; min-height: 28px; color: #776e65; }
.msg button { margin-left: 10px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>2048</h1>
    <div class="score-box">
      <div class="label">分数</div>
      <div class="value" id="score">0</div>
    </div>
  </div>
  <div class="grid-bg" id="grid"></div>
  <div class="dpad" id="dpad">
    <div class="dpad-row"><button class="dpad-btn empty"></button><button class="dpad-btn" data-dir="2">▲</button><button class="dpad-btn empty"></button></div>
    <div class="dpad-row"><button class="dpad-btn" data-dir="0">◀</button><button class="dpad-btn" data-dir="3">▼</button><button class="dpad-btn" data-dir="1">▶</button></div>
  </div>
  <div class="msg" id="msg"><button class="btn" onclick="startGame()">新游戏</button></div>
</div>
<script>
const SIZE = 4;
let grid = [], score = 0, over = false;
const gridEl = document.getElementById('grid');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');

function initGrid() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0; over = false;
  spawn(); spawn();
  render();
}

function spawn() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!grid[r][c]) empty.push([r, c]);
  if (!empty.length) return false;
  const [r, c] = empty[Math.random() * empty.length | 0];
  grid[r][c] = Math.random() < .9 ? 2 : 4;
  return true;
}

function slide(row) {
  const arr = row.filter(v => v);
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2;
      score += arr[i];
      arr.splice(i + 1, 1);
    }
  }
  while (arr.length < SIZE) arr.push(0);
  return arr;
}

function move(d) {
  if (over) return;
  const old = grid.map(r => [...r]);
  if (d === 0) grid = grid.map(r => slide(r));              // left
  if (d === 1) grid = grid.map(r => slide([...r].reverse())).map(r => r.reverse()); // right
  if (d === 2) grid = transpose(transpose(grid).map(c => slide([...c]))); // up
  if (d === 3) grid = transpose(transpose(grid).map(c => slide([...c].reverse()).reverse())); // down

  const changed = grid.some((r, i) => r.some((v, j) => v !== old[i][j]));
  if (!changed) return;
  spawn();
  render();
  checkGameOver();
}

function transpose(m) { return m[0].map((_, i) => m.map(r => r[i])); }

function checkGameOver() {
  if (grid.some(r => r.some(v => v === 2048))) { msgEl.innerHTML = '🎉 你赢了！<button class="btn" onclick="startGame()">再来一局</button>'; over = true; return; }
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c]) return;
      if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return;
      if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return;
    }
  msgEl.innerHTML = '💀 游戏结束 <button class="btn" onclick="startGame()">再来一局</button>';
  over = true;
}

function render() {
  gridEl.innerHTML = grid.map(row => row.map(v => `<div class="tile" data-v="${v}">${v || ''}</div>`).join('')).join('');
  scoreEl.textContent = score;
}

function startGame() { msgEl.innerHTML = ''; initGrid(); }

document.addEventListener('keydown', e => {
  if (e.key.startsWith('Arrow')) { e.preventDefault(); move({ArrowLeft:0,ArrowRight:1,ArrowUp:2,ArrowDown:3}[e.key]); }
});

document.getElementById('dpad').addEventListener('click', e => { const d = e.target.dataset.dir; if (d !== undefined) move(+d); });

let mouseX, mouseY, mouseDown = false;
document.addEventListener('mousedown', e => { mouseX = e.clientX; mouseY = e.clientY; mouseDown = true; });
document.addEventListener('mouseup', e => {
  if (!mouseDown) return; mouseDown = false;
  const dx = e.clientX - mouseX, dy = e.clientY - mouseY;
  const absX = Math.abs(dx), absY = Math.abs(dy);
  if (Math.max(absX, absY) < 20) return;
  move(absX > absY ? (dx > 0 ? 1 : 0) : (dy > 0 ? 3 : 2));
});

let touchX, touchY;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX, dy = e.changedTouches[0].clientY - touchY;
  const absX = Math.abs(dx), absY = Math.abs(dy);
  if (Math.max(absX, absY) < 20) return;
  move(absX > absY ? (dx > 0 ? 1 : 0) : (dy > 0 ? 3 : 2));
});

startGame();
</script>
</body>
</html>
